<script>
        function toggleSection(id, iconId) {
            const section = document.getElementById(id);
            const icon = document.getElementById(iconId);
            const isExpanded = section.style.maxHeight !== '0px';

            if (isExpanded) {
                section.style.maxHeight = '0px';
                section.style.opacity = '0';
                icon.style.transform = 'rotate(0deg)';
            } else {
                // Approximate max-height for content
                section.style.maxHeight = '500px'; 
                section.style.opacity = '1';
                icon.style.transform = 'rotate(180deg)';
            }
        }

        const divisionDepartments = {
            "strategy-and-operations": {
                label: "Strategy & Operations",
                departments: ["Executive Leadership", "Program Management Office", "Human Resources", "Recruiting", "Risk Management"]
            },
            "product-and-design": {
                label: "Product & Design",
                departments: ["Product Management", "Service Design", "Experience Design", "User Research"]
            },
            "technology-and-data": {
                label: "Technology & Data",
                departments: ["Engineering", "Platform Engineering", "Data Engineering", "AI Engineering", "Security"],
                entries: {
                    "AI Engineering": [
                        { name: "Tess", title: "Autonomy Engineer", level: "Level 4" }
                    ]
                }
            },
            "revenue-and-market": {
                label: "Revenue & Market",
                departments: ["Sales", "Marketing", "Partnerships", "Customer Success", "Support"]
            },
            "finance": {
                label: "Finance",
                departments: ["Accounting", "Accounts Payable", "Accounts Receivable", "Purchasing", "Tax"]
            },
            "administration": {
                label: "Administration",
                departments: ["People Operations", "Legal", "Compliance", "Vendor Management"]
            }
        };

        const departmentIcons = ["corporate_fare", "account_tree", "groups_2", "person_search", "shield"];

        function renderDepartmentSections(divisionSlug) {
            const selected = divisionDepartments[divisionSlug] || divisionDepartments["strategy-and-operations"];
            const container = document.getElementById('department-sections');
            container.innerHTML = selected.departments.map((department, index) => {
                const listId = `${divisionSlug}-dept-${index}-list`;
                const iconId = `${divisionSlug}-dept-${index}-icon`;
                const icon = departmentIcons[index] || "business_center";
                const entries = selected.entries?.[department] || [];
                const entryMarkup = entries.length ? entries.map(entry => `
                    <button class="w-full text-left flex flex-col gap-1 p-3 rounded-lg border border-white/10 bg-surface-container-lowest hover:border-primary/40 hover:bg-white/5 transition-all" type="button" onclick="selectRole('${entry.name}', '${entry.title}', '${entry.level}')">
                        <span class="text-sm font-medium text-primary">${entry.name}</span>
                        <span class="text-xs text-on-surface">${entry.title}</span>
                        <span class="text-[10px] uppercase tracking-widest text-on-surface-variant">${entry.level}</span>
                    </button>
                `).join('') : `
                    <div class="flex flex-col">
                        <span class="text-sm font-medium text-primary">${department}</span>
                        <span class="text-xs text-on-surface-variant">${selected.label}</span>
                    </div>
                `;
                return `
                    <div class="group">
                        <button class="department-toggle w-full flex items-center justify-between p-3 rounded-lg transition-all" onclick="toggleSection('${listId}', '${iconId}')">
                            <div class="flex items-center gap-3">
                                <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">${icon}</span>
                                <span class="font-body-md font-semibold text-on-surface">${department}</span>
                            </div>
                            <span class="material-symbols-outlined text-on-surface-variant transition-transform" id="${iconId}">expand_more</span>
                        </button>
                        <div class="max-height-0 overflow-hidden section-collapse opacity-0" id="${listId}" style="max-height: 0px; opacity: 0;">
                            <div class="pl-12 py-2 space-y-3">
                                ${entryMarkup}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectRole(name, title, level) {
            const mainWindowTitle = document.getElementById('main-window-title');
            mainWindowTitle.textContent = `${name} · ${title} · ${level}`;
        }

        let codexSessionId = null;
        const mindShareExtensionId = 'fomlcadcldjpnlbapddpmlikinmdiiji';
        const pendingMindShareRequests = new Map();

        function mindShareLocalClient() {
            if (window.MindShareLocalClient) {
                return window.MindShareLocalClient;
            }

            return {
                connectCodex() {
                    return sendMindShareExtensionRequest('connectCodex', {}, 30000);
                },
                sendCodexMessage(payload) {
                    return sendMindShareExtensionRequest('sendCodexMessage', payload, 300000);
                }
            };
        }

        window.addEventListener('message', (event) => {
            if (event.source !== window) return;
            if (!event.data || event.data.type !== 'MINDSHARE_LOCAL_CLIENT_RESPONSE') return;

            const request = pendingMindShareRequests.get(event.data.id);
            if (!request) return;

            clearTimeout(request.timer);
            pendingMindShareRequests.delete(event.data.id);
            request.resolve(event.data);
        });

        function sendMindShareExtensionRequest(method, payload, timeoutMs) {
            if (window.chrome?.runtime?.sendMessage) {
                return new Promise((resolve) => {
                    let settled = false;
                    const timer = setTimeout(() => {
                        if (settled) return;
                        settled = true;
                        resolve(sendMindSharePageMessage(method, payload, timeoutMs));
                    }, 1500);

                    try {
                        window.chrome.runtime.sendMessage(
                            mindShareExtensionId,
                            {
                                type: 'MINDSHARE_LOCAL_CLIENT_REQUEST',
                                id: crypto.randomUUID(),
                                method,
                                payload: payload || {}
                            },
                            (response) => {
                                if (settled) return;
                                settled = true;
                                clearTimeout(timer);
                                if (response) {
                                    resolve(response);
                                } else {
                                    resolve(sendMindSharePageMessage(method, payload, timeoutMs));
                                }
                            }
                        );
                    } catch {
                        clearTimeout(timer);
                        settled = true;
                        resolve(sendMindSharePageMessage(method, payload, timeoutMs));
                    }
                });
            }

            return sendMindSharePageMessage(method, payload, timeoutMs);
        }

        function sendMindSharePageMessage(method, payload, timeoutMs) {
            const id = crypto.randomUUID();
            return new Promise((resolve) => {
                const timer = setTimeout(() => {
                    pendingMindShareRequests.delete(id);
                    resolve({
                        id,
                        ok: false,
                        action: 'installExtension',
                        message: 'MindShare extension did not answer from this browser.'
                    });
                }, timeoutMs);

                pendingMindShareRequests.set(id, { resolve, timer });
                window.postMessage({
                    type: 'MINDSHARE_LOCAL_CLIENT_REQUEST',
                    id,
                    method,
                    payload: payload || {}
                }, '*');
            });
        }

        function clearChatPlaceholder() {
            const transcript = document.getElementById('chat-transcript');
            const placeholder = transcript.querySelector('[data-chat-placeholder]');
            if (placeholder) {
                placeholder.remove();
            }
        }

        function escapeHtml(value) {
            return value
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function addChatMessage(role, text) {
            const transcript = document.getElementById('chat-transcript');
            clearChatPlaceholder();
            const isUser = role === 'user';
            const row = document.createElement('div');
            row.className = `max-w-4xl mx-auto mb-6 flex gap-4 ${isUser ? 'flex-row-reverse' : ''}`;
            row.innerHTML = `
                <div class="${isUser ? 'metallic-silver text-on-primary' : 'glass-panel-heavy border border-primary/30 text-primary'} w-9 h-9 rounded-lg flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-[20px]">${isUser ? 'person' : 'smart_toy'}</span>
                </div>
                <div class="${isUser ? 'bg-primary-container text-primary-fixed rounded-tr-none' : 'glass-panel-heavy text-on-surface rounded-tl-none silver-edge'} max-w-3xl p-5 rounded-2xl whitespace-pre-wrap leading-relaxed font-body-md">${escapeHtml(text)}</div>
            `;
            transcript.appendChild(row);
            transcript.scrollTop = transcript.scrollHeight;
        }

        function addChatError(text) {
            addChatMessage('system', text);
        }

        function showLocalClientInstallPrompt() {
            const transcript = document.getElementById('chat-transcript');
            clearChatPlaceholder();
            const row = document.createElement('div');
            row.className = 'max-w-4xl mx-auto mb-6 flex gap-4';
            row.innerHTML = `
                <div class="glass-panel-heavy border border-primary/30 text-primary w-9 h-9 rounded-lg flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-[20px]">extension</span>
                </div>
                <div class="glass-panel-heavy text-on-surface rounded-tl-none silver-edge max-w-3xl p-5 rounded-2xl leading-relaxed font-body-md">
                    <p>MindShare could not connect to Codex CLI from this browser. Make sure the MindShare extension is installed and reload this page.</p>
                </div>
            `;
            transcript.appendChild(row);
            transcript.scrollTop = transcript.scrollHeight;
        }

        async function connectCodex() {
            const button = document.getElementById('connect-codex-button');
            button.disabled = true;
            button.classList.add('opacity-60');
            addChatMessage('system', 'Connecting to local Codex...');

            try {
                const client = mindShareLocalClient();
                if (!client?.connectCodex) {
                    showLocalClientInstallPrompt();
                    return;
                }
                const payload = await client.connectCodex();
                if (!payload.ok) {
                    if (payload.action === 'installExtension' || payload.action === 'installNativeHost') {
                        showLocalClientInstallPrompt();
                    } else if (payload.action === 'install') {
                        addChatError('Codex CLI was not found on this machine. Install Codex locally, restart the MindShare Local Client, then reconnect.');
                    } else if (payload.action === 'login') {
                        addChatError('Codex CLI is installed but not logged in. Run `codex login` locally, then reconnect.');
                    } else {
                        addChatError(payload.message || payload.error || 'Codex connection failed.');
                    }
                    return;
                }
                codexSessionId = payload.sessionId;
                button.classList.remove('text-on-surface-variant');
                button.classList.add('text-primary');
                addChatMessage('system', payload.message || 'Connected to local Codex.');
            } catch (error) {
                addChatError(`Codex connection failed: ${error.message || error}`);
            } finally {
                button.disabled = false;
                button.classList.remove('opacity-60');
            }
        }

        function connectClaude() {
            addChatError('Claude connection is not wired yet. Next step is adding the Claude adapter to MindShare Local Client.');
        }

        async function sendCodexMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;
            if (!codexSessionId) {
                addChatError('Connect Codex before sending a message.');
                return;
            }

            input.value = '';
            addChatMessage('user', message);
            addChatMessage('system', 'Codex is working...');

            try {
                const client = mindShareLocalClient();
                if (!client?.sendCodexMessage) {
                    addChatError('MindShare Local Client is not connected. Start the local client, reconnect Codex, then send again.');
                    return;
                }
                const payload = await client.sendCodexMessage({ sessionId: codexSessionId, message });
                if (!payload.ok) {
                    addChatError(payload.error || payload.reply || 'Codex returned an error.');
                    return;
                }
                addChatMessage('assistant', payload.reply || '(No response)');
            } catch (error) {
                addChatError(`Lost connection to the MindShare Local Client: ${error.message || error}`);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const divisionSelect = document.getElementById('division-select');
            const requestedDivision = new URLSearchParams(window.location.search).get('division') || 'strategy-and-operations';
            const selectedSlug = divisionDepartments[requestedDivision] ? requestedDivision : 'strategy-and-operations';
            divisionSelect.value = selectedSlug;
            renderDepartmentSections(selectedSlug);

            divisionSelect.addEventListener('change', () => {
                const slug = divisionSelect.value;
                renderDepartmentSections(slug);
                const url = new URL(window.location.href);
                url.searchParams.set('division', slug);
                history.replaceState(null, '', url.toString());
            });

            document.getElementById('connect-codex-button').addEventListener('click', connectCodex);
            document.getElementById('connect-claude-button').addEventListener('click', connectClaude);
            document.getElementById('send-message-button').addEventListener('click', sendCodexMessage);
            document.getElementById('chat-input').addEventListener('keydown', (event) => {
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    sendCodexMessage();
                }
            });
        });
    </script>


</body></html>
