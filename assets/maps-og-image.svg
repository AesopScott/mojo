<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MAPS - Multi-Agent Pipeline Skills</title>
  <desc id="desc">A Mojo AI Studio social preview image for the MAPS builder framework.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8faf7"/>
      <stop offset="0.48" stop-color="#edf5f7"/>
      <stop offset="1" stop-color="#f9f3e6"/>
    </linearGradient>
    <linearGradient id="mbar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#215f8f"/>
      <stop offset="1" stop-color="#2f8f6f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#14202c" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="60" width="1056" height="510" rx="34" fill="#ffffff" filter="url(#softShadow)"/>
  <rect x="72" y="60" width="1056" height="510" rx="34" fill="none" stroke="#d8e2dc" stroke-width="2"/>

  <g transform="translate(116 104)">
    <rect x="0" y="0" width="78" height="78" rx="20" fill="url(#mbar)"/>
    <text x="39" y="55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="800" fill="#ffffff">M</text>
    <text x="102" y="30" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#24313a">Mojo AI Studio</text>
    <text x="102" y="62" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="600" fill="#5c6872">Builder framework for agent systems</text>
  </g>

  <g transform="translate(116 250)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="88" font-weight="900" fill="#17222b">MAPS</text>
    <text x="0" y="58" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#215f8f">Multi-Agent Pipeline Skills</text>
    <text x="0" y="108" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="500" fill="#46545d">Define, design, build, equip, evaluate, deploy,</text>
    <text x="0" y="144" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="500" fill="#46545d">observe, and improve agent capabilities.</text>
  </g>

  <g transform="translate(116 444)" font-family="Inter, Arial, sans-serif">
    <rect x="0" y="0" width="450" height="80" rx="18" fill="#e8f2ef" stroke="#b8d8cc"/>
    <text x="28" y="34" font-size="22" font-weight="800" fill="#2f6f5f">APS this week</text>
    <text x="28" y="60" font-size="18" font-weight="600" fill="#52625d">Agent Pipeline Skills</text>

    <rect x="484" y="0" width="450" height="80" rx="18" fill="#edf3f9" stroke="#bfd5ea"/>
    <text x="512" y="34" font-size="22" font-weight="800" fill="#215f8f">M scaffold next</text>
    <text x="512" y="60" font-size="18" font-weight="600" fill="#52606b">Multi-agent project layer</text>
  </g>

  <g transform="translate(790 136)" opacity="0.96">
    <path d="M104 0h172c28 0 50 22 50 50v168c0 28-22 50-50 50H104c-28 0-50-22-50-50V50c0-28 22-50 50-50z" fill="#f3f8f6" stroke="#c8ded6" stroke-width="3"/>
    <path d="M112 72h150M112 124h150M112 176h112" stroke="#2f8f6f" stroke-width="18" stroke-linecap="round"/>
    <circle cx="44" cy="72" r="20" fill="#215f8f"/>
    <circle cx="44" cy="124" r="20" fill="#2f8f6f"/>
    <circle cx="44" cy="176" r="20" fill="#d9922f"/>
    <path d="M44 92v12M44 144v12" stroke="#6f7b84" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
