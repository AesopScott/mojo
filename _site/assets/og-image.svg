<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Accent glow circle -->
  <circle cx="900" cy="180" r="220" fill="#4f46e5" opacity="0.08" filter="url(#glow)"/>
  <circle cx="280" cy="480" r="160" fill="#7c3aed" opacity="0.06" filter="url(#glow)"/>

  <!-- Brand mark -->
  <rect x="80" y="80" width="72" height="72" rx="16" fill="url(#accent)"/>
  <text x="116" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" text-anchor="middle" fill="white">M</text>

  <!-- Brand name -->
  <text x="172" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="0.5">Mojo AI Studio</text>

  <!-- Divider -->
  <rect x="80" y="200" width="560" height="2" fill="url(#accent)" opacity="0.4" rx="1"/>

  <!-- Main headline -->
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-1">AI-Built Software</text>
  <text x="80" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-1">for Real Workflows.</text>

  <!-- Subtext -->
  <text x="80" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#a5b4fc" font-weight="400">Buy focused AI apps · Commission custom builds · Learn to build AI</text>

  <!-- Product pills -->
  <rect x="80" y="500" width="110" height="40" rx="20" fill="#4f46e5" opacity="0.25"/>
  <text x="135" y="525" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#a5b4fc" text-anchor="middle">GAIN</text>

  <rect x="204" y="500" width="160" height="40" rx="20" fill="#4f46e5" opacity="0.15"/>
  <text x="284" y="525" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#6366f1" text-anchor="middle">+ more coming</text>

  <!-- Right side visual — stacked app cards -->
  <g transform="translate(720, 140)" opacity="0.9">
    <!-- Card 1 (back) -->
    <rect x="80" y="40" width="340" height="180" rx="16" fill="#1e1e3a" stroke="#4f46e5" stroke-width="1" opacity="0.6"/>
    <!-- Card 2 (front) -->
    <rect x="20" y="10" width="340" height="200" rx="16" fill="#252545" stroke="#6366f1" stroke-width="1.5"/>
    <!-- Card header -->
    <rect x="20" y="10" width="340" height="56" rx="16" fill="#2d2d55"/>
    <rect x="20" y="42" width="340" height="24" fill="#2d2d55"/>
    <!-- Icon -->
    <rect x="38" y="24" width="28" height="28" rx="7" fill="#4f46e5"/>
    <text x="52" y="44" font-family="system-ui, sans-serif" font-size="16" font-weight="800" text-anchor="middle" fill="white">G</text>
    <!-- Card title -->
    <text x="76" y="36" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">GAIN — Govern AI Now</text>
    <text x="76" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1">Governance · Live Now</text>
    <!-- Card body lines -->
    <rect x="38" y="80" width="200" height="10" rx="5" fill="#3d3d6b"/>
    <rect x="38" y="100" width="160" height="10" rx="5" fill="#3d3d6b"/>
    <rect x="38" y="120" width="180" height="10" rx="5" fill="#3d3d6b"/>
    <!-- Price -->
    <text x="38" y="168" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">$0 – $500</text>
    <text x="140" y="168" font-family="system-ui, sans-serif" font-size="12" fill="#6366f1">/mo</text>
    <!-- Button -->
    <rect x="240" y="153" width="100" height="32" rx="8" fill="#4f46e5"/>
    <text x="290" y="173" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="white">Start Free</text>
  </g>

  <!-- Bottom URL -->
  <text x="80" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#4f46e5" font-weight="500">mojoaistudio.com</text>
</svg>
