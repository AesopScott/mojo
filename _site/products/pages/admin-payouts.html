<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Payouts Dashboard — Mojo AI Studio</title>
  <link rel="stylesheet" href="../../styles/shared.css">
  <style>
    body {
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
    }

    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .admin-header h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--ink);
      margin: 0;
    }

    .logout-btn {
      padding: 8px 16px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .logout-btn:hover {
      background: #dc2626;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--ink);
    }

    .payouts-section {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .payouts-header {
      padding: 20px;
      border-bottom: 1px solid var(--line);
      background: #f9fafb;
    }

    .payouts-header h2 {
      margin: 0;
      font-size: 18px;
      color: var(--ink);
    }

    .payouts-table {
      width: 100%;
      border-collapse: collapse;
    }

    .payouts-table th {
      background: #f9fafb;
      padding: 12px 20px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--line);
    }

    .payouts-table td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }

    .payouts-table tr:hover {
      background: #f9fafb;
    }

    .seller-name {
      font-weight: 600;
      color: var(--ink);
    }

    .seller-email {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .amount {
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-pending {
      background: #fef3c7;
      color: #92400e;
    }

    .status-completed {
      background: #d1fae5;
      color: #065f46;
    }

    .bank-details {
      font-size: 13px;
      color: var(--muted);
      font-family: monospace;
      margin-top: 4px;
      padding: 8px;
      background: #f3f4f6;
      border-radius: 4px;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .btn-complete {
      padding: 8px 12px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .btn-complete:hover {
      background: #2563eb;
    }

    .btn-complete:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state p {
      margin: 8px 0;
    }

    .login-container {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 40px;
      text-align: center;
    }

    .login-container h1 {
      margin: 0 0 24px 0;
      font-size: 24px;
      color: var(--ink);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-form input {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 14px;
    }

    .login-form button {
      padding: 12px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .login-form button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- Login Form -->
    <div id="login-view" class="login-container" style="display: none;">
      <h1>Admin Access</h1>
      <form id="login-form" class="login-form">
        <input type="password" id="admin-key" placeholder="Admin key" required>
        <button type="submit">Sign In</button>
      </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-view" style="display: none;">
      <div class="admin-header">
        <h1>Payout Requests</h1>
        <button class="logout-btn" id="logout-btn">Sign Out</button>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Pending Payouts</div>
          <div class="stat-value" id="stat-pending">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending Amount</div>
          <div class="stat-value" id="stat-pending-amount">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completed This Month</div>
          <div class="stat-value" id="stat-completed">—</div>
        </div>
      </div>

      <div class="payouts-section">
        <div class="payouts-header">
          <h2>Pending Requests</h2>
        </div>
        <table class="payouts-table" id="payouts-table">
          <thead>
            <tr>
              <th>Seller</th>
              <th>Amount</th>
              <th>Bank Account</th>
              <th>Requested</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="payouts-tbody">
            <tr>
              <td colspan="6" class="empty-state">
                <p>Loading payouts...</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="../../scripts/firebase-config.js"></script>
  <script src="../../scripts/admin-payouts.js"></script>
</body>
</html>
