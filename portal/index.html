<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Mojo AI Studio | Sign In</title>
    <link rel="stylesheet" href="../styles/shared.css?v=__CACHE_BUST__" />
  </head>
  <body>
    <header class="site-header" id="top">
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="brand" href="/" aria-label="Mojo AI Studio home">
          <span class="brand-mark">M</span>
          <span>Mojo AI Studio</span>
        </a>
        <div class="nav-links">
          <a href="/products">Products</a>
          <a href="/development">Development</a>
          <a href="/WatchAI">Learn</a>
        </div>
        <div class="nav-actions">
          <a class="button ghost active" href="/portal/" aria-current="page">Sign in</a>
          <a class="button dark" href="/products">Browse apps</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="section portal-section">
        <div class="auth-card">
          <div class="auth-tabs" role="tablist" aria-label="Sign in or create account">
            <button class="auth-tab is-active" type="button" role="tab"
                    data-tab="signin" aria-selected="true">Sign in</button>
            <button class="auth-tab" type="button" role="tab"
                    data-tab="signup" aria-selected="false">Create account</button>
          </div>

          <!-- Google sign-in (works for both sign-in and sign-up) -->
          <button type="button" class="button-google" id="google-signin-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
              <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
              <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
              <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.548 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
              <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/>
            </svg>
            Continue with Google
          </button>

          <div class="auth-divider"><span>or</span></div>
          <div class="auth-error" id="google-error" role="alert" hidden></div>

          <!-- Sign in -->
          <form id="signin-form" class="auth-form" novalidate>
            <div class="form-field">
              <label for="signin-email">Email</label>
              <input type="email" id="signin-email" name="email"
                     autocomplete="email" required />
            </div>

            <div class="form-field">
              <label for="signin-password">Password</label>
              <input type="password" id="signin-password" name="password"
                     autocomplete="current-password" required />
            </div>

            <div class="auth-error" id="signin-error" role="alert" hidden></div>

            <button type="submit" class="button dark">Sign in</button>
            <a class="auth-link" href="#" id="forgot-password">Forgot password?</a>
          </form>

          <!-- Sign up -->
          <form id="signup-form" class="auth-form" novalidate hidden>
            <div class="form-field">
              <label for="signup-email">Email</label>
              <input type="email" id="signup-email" name="email"
                     autocomplete="email" required />
            </div>

            <div class="form-field">
              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" name="new-password"
                     autocomplete="new-password" required minlength="8" />
              <small class="field-hint">At least 8 characters</small>
            </div>

            <div class="form-field">
              <label for="signup-confirm">Confirm password</label>
              <input type="password" id="signup-confirm" name="confirm-password"
                     autocomplete="new-password" required minlength="8" />
            </div>

            <div class="auth-error" id="signup-error" role="alert" hidden></div>

            <button type="submit" class="button dark">Create account</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <a class="brand" href="/">
          <span class="brand-mark">M</span>
          <span>Mojo AI Studio</span>
        </a>
        <p>AI-built software for practical workflows.</p>
      </div>
      <div>
        <b>Marketplace</b>
        <a href="/products">Browse apps</a>
        <a href="/products#compare">Compare plans</a>
      </div>
      <div>
        <b>Studio</b>
        <a href="/development">Custom development</a>
        <a href="/WatchAI">Learn to build AI</a>
        <a href="mailto:admin@MojoAiStudio.com">Contact</a>
      </div>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="../scripts/firebase-config.js?v=__CACHE_BUST__"></script>
    <script src="scripts/portal-auth.js?v=__CACHE_BUST__"></script>
  </body>
</html>
