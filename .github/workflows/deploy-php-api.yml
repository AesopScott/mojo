name: Deploy PHP API to Mocahost

on:
  push:
    branches:
      - main
    paths:
      - api/**
      - .github/workflows/deploy-php-api.yml
  workflow_dispatch:

concurrency:
  group: deploy-php-api-mojo
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy API via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 65.181.111.131
          username: hivetec1
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./api/
          server-dir: /public_html/mojo/api/
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
