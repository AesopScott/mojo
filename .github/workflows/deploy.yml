name: Deploy to Mocahost (Mojo AI Studio)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-mocahost-mojo
  # Keep queued deploys running in order so an in-flight FTP upload is not
  # cancelled halfway through and left partially deployed.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject cache-bust token and config tokens
        env:
          POLAR_ORG:        ${{ vars.POLAR_ORG }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          BUST="${GITHUB_SHA:0:7}"
          ORG="${POLAR_ORG:-}"
          find . -name "*.html" -exec sed -i "s/__CACHE_BUST__/$BUST/g" {} +
          find . -name "*.js"   -exec sed -i "s/__CACHE_BUST__/$BUST/g" {} +
          if [ -n "$ORG" ]; then
            find . -name "*.html" -exec sed -i "s|__POLAR_ORG__|$ORG|g" {} +
          fi
          if [ -n "$FIREBASE_API_KEY" ]; then
            find . -name "*.js" -exec sed -i "s|__FIREBASE_API_KEY__|$FIREBASE_API_KEY|g" {} +
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 65.181.111.131
          username: hivetec1
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /public_html/mojo/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.DS_Store
            **/README.md
            cgi-bin/**
