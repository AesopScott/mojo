name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-pages-mojo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static deploy folder
        env:
          POLAR_ORG:        ${{ vars.POLAR_ORG }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          mkdir -p _site
          rsync -av ./ _site/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.htaccess' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'AGENTS.md' \
            --exclude 'CLAUDE.md' \
            --exclude 'README.md' \
            --exclude 'SELLER_PAYOUT_SYSTEM.md' \
            --exclude 'api/' \
            --exclude 'docs/' \
            --exclude 'functions/' \
            --exclude 'node_modules/' \
            --exclude 'oauth/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'firebase.json' \
            --exclude 'firestore.rules' \
            --exclude 'firestore.indexes.json' \
            --exclude 'scripts/*.php' \
            --exclude 'scripts/*.mjs' \
            --exclude '_site/'
          cp _redirects _site/_redirects
          cp _headers _site/_headers
          BUST="${GITHUB_SHA:0:7}"
          ORG="${POLAR_ORG:-}"
          find _site -name "*.html" -exec sed -i "s/__CACHE_BUST__/$BUST/g" {} +
          find _site -name "*.js"   -exec sed -i "s/__CACHE_BUST__/$BUST/g" {} +
          if [ -n "$ORG" ]; then
            find _site -name "*.html" -exec sed -i "s|__POLAR_ORG__|$ORG|g" {} +
          fi
          if [ -n "$FIREBASE_API_KEY" ]; then
            find _site -name "*.js" -exec sed -i "s|__FIREBASE_API_KEY__|$FIREBASE_API_KEY|g" {} +
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name mojoaistudio-com --branch main
