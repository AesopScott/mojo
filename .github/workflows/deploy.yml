name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-pages-mojo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static deploy folder
        env:
          POLAR_ORG:        ${{ vars.POLAR_ORG }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          MOJO_PAYPAL_PAY_TO: ${{ vars.MOJO_PAYPAL_PAY_TO }}
          MOJO_ZELLE_PAY_TO:  ${{ vars.MOJO_ZELLE_PAY_TO }}
        run: |
          mkdir -p _site
          rsync -av ./ _site/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.htaccess' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'AGENTS.md' \
            --exclude 'CLAUDE.md' \
            --exclude 'README.md' \
            --exclude 'SELLER_PAYOUT_SYSTEM.md' \
            --exclude 'Claude_Architect_Practice_Exam.md' \
            --exclude 'Claude_Architect_Two_Hour_Trainer_Syllabus.md' \
            --exclude 'api/' \
            --exclude 'cloudflare/' \
            --exclude 'docs/' \
            --exclude 'functions/' \
            --exclude 'node_modules/' \
            --exclude 'oauth/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'firebase.json' \
            --exclude 'firestore.rules' \
            --exclude 'firestore.indexes.json' \
            --exclude 'scripts/*.php' \
            --exclude 'scripts/*.mjs' \
            --exclude '_site/'
          cp _redirects _site/_redirects
          cp _headers _site/_headers
          BUST="${GITHUB_SHA:0:7}"
          ORG="${POLAR_ORG:-}"
          PAYPAL_PAY_TO="${MOJO_PAYPAL_PAY_TO:-admin@mojoaistudio.com}"
          ZELLE_PAY_TO="${MOJO_ZELLE_PAY_TO:-Contact Mojo for the Zelle phone number}"
          find _site -name "*.html" -exec sed -i "s/__CACHE_BUST__/$BUST/g" {} +
          find _site -name "*.js"   -exec sed -i "s/__CACHE_BUST__/$BUST/g" {} +
          if [ -n "$ORG" ]; then
          find _site -name "*.html" -exec sed -i "s|__POLAR_ORG__|$ORG|g" {} +
          fi
          find _site -name "*.html" -exec sed -i "s|__MOJO_PAYPAL_PAY_TO__|$PAYPAL_PAY_TO|g" {} +
          find _site -name "*.html" -exec sed -i "s|__MOJO_ZELLE_PAY_TO__|$ZELLE_PAY_TO|g" {} +
          if [ -n "$FIREBASE_API_KEY" ]; then
            find _site -name "*.js" -exec sed -i "s|__FIREBASE_API_KEY__|$FIREBASE_API_KEY|g" {} +
          fi
          node scripts/inject-fractional-caio-ciso-nav.mjs
          cp cloudflare/pages-worker.js _site/_worker.js

      - name: Provision KV namespaces
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler kv namespace list > kv-namespaces.json

          resolve_or_create_kv() {
            local title="$1"
            local id
            id="$(node -e "const fs=require('fs');const ns=JSON.parse(fs.readFileSync('kv-namespaces.json','utf8'));const found=ns.find(n=>n.title==='$title');process.stdout.write(found?found.id:'');")"
            if [ -z "$id" ]; then
              npx wrangler kv namespace create "$title" > kv-create.txt
              id="$(node -e "const fs=require('fs');const out=fs.readFileSync('kv-create.txt','utf8');const m=out.match(/id\s*=\s*\"([^\"]+)\"/)|| out.match(/\"id\"\s*:\s*\"([^\"]+)\"/);if(!m)throw new Error('KV id not found');process.stdout.write(m[1]);")"
            fi
            echo "$id"
          }

          SMS_KV_ID="$(resolve_or_create_kv mojo-sms-reminders)"
          SUBMISSIONS_KV_ID="$(resolve_or_create_kv mojo-product-submissions)"

          export SMS_KV_ID SUBMISSIONS_KV_ID
          node -e "
            const fs = require('fs');
            fs.writeFileSync('wrangler.jsonc', JSON.stringify({
              name: 'mojoaistudio-com',
              pages_build_output_dir: './_site',
              compatibility_date: '2026-06-14',
              d1_databases: [
                {
                  binding: 'FORUM_DB',
                  database_name: 'mojo-forum',
                  database_id: '3588eba2-cc34-4e11-99a7-6496401a9530',
                },
              ],
              kv_namespaces: [
                { binding: 'SMS_REMINDERS',       id: process.env.SMS_KV_ID },
                { binding: 'PRODUCT_SUBMISSIONS', id: process.env.SUBMISSIONS_KV_ID },
              ],
            }, null, 2));
          "
          cat wrangler.jsonc

      - name: Sync Pages runtime secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MEETUP_ADMIN_KEY:      ${{ secrets.MEETUP_ADMIN_KEY }}
          TWILIO_ACCOUNT_SID:    ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:     ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER:    ${{ secrets.TWILIO_FROM_NUMBER }}
          RESEND_API_KEY:        ${{ secrets.RESEND_API_KEY }}
          ZOOM_SECRET_TOKEN:     ${{ secrets.ZOOM_SECRET_TOKEN }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const required = [
            'MEETUP_ADMIN_KEY',
            'TWILIO_ACCOUNT_SID',
            'TWILIO_AUTH_TOKEN',
            'TWILIO_FROM_NUMBER',
            'RESEND_API_KEY',
            'ZOOM_SECRET_TOKEN',
          ];
          const secrets = {};
          for (const name of required) {
            const value = process.env[name] || '';
            if (!value) throw new Error(`Missing required secret: ${name}`);
            secrets[name] = value;
          }
          fs.writeFileSync('pages-secrets.json', JSON.stringify(secrets));
          NODE
          npx wrangler pages secret bulk pages-secrets.json --project-name mojoaistudio-com
          rm -f pages-secrets.json

      - name: Attach Pages custom domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          node - <<'NODE'
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const project = 'mojoaistudio-com';
          const domain = 'mojoaistudio.com';
          const base = `https://api.cloudflare.com/client/v4/accounts/${accountId}/pages/projects/${project}/domains`;
          const headers = {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json',
          };

          async function cf(path = '', init = {}) {
            const response = await fetch(`${base}${path}`, { ...init, headers });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok || payload.success === false) {
              const errors = JSON.stringify(payload.errors || payload, null, 2);
              throw new Error(`Cloudflare Pages domain request failed (${response.status}): ${errors}`);
            }
            return payload;
          }

          const existing = await cf();
          const domains = Array.isArray(existing.result) ? existing.result : [];
          const current = domains.find((item) => item.name === domain);
          if (current) {
            console.log(`${domain} already attached with status: ${current.status}`);
          } else {
            const created = await cf('', {
              method: 'POST',
              body: JSON.stringify({ name: domain }),
            });
            console.log(`${domain} attached with status: ${created.result?.status || 'unknown'}`);
          }
          NODE

      - name: Point apex DNS at Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          node - <<'NODE'
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const zoneName = 'mojoaistudio.com';
          const domain = 'mojoaistudio.com';
          const target = 'mojoaistudio-com.pages.dev';
          const api = 'https://api.cloudflare.com/client/v4';
          const headers = {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json',
          };

          async function cf(url, init = {}) {
            const response = await fetch(url, { ...init, headers });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok || payload.success === false) {
              const errors = JSON.stringify(payload.errors || payload, null, 2);
              throw new Error(`Cloudflare DNS request failed (${response.status}): ${errors}`);
            }
            return payload;
          }

          const zones = await cf(`${api}/zones?name=${encodeURIComponent(zoneName)}&per_page=1`);
          const zone = zones.result?.[0];
          if (!zone?.id) {
            throw new Error(`Cloudflare zone not found for ${zoneName}`);
          }

          const recordsPayload = await cf(`${api}/zones/${zone.id}/dns_records?name=${encodeURIComponent(domain)}&per_page=100`);
          const managedTypes = new Set(['A', 'AAAA', 'CNAME']);
          const managedRecords = (recordsPayload.result || []).filter((record) => managedTypes.has(record.type));
          const existingPagesRecord = managedRecords.find((record) => record.type === 'CNAME' && record.content === target);

          if (existingPagesRecord && managedRecords.length === 1 && existingPagesRecord.proxied === true) {
            console.log(`${domain} already points to ${target}`);
          } else {
            for (const record of managedRecords) {
              await cf(`${api}/zones/${zone.id}/dns_records/${record.id}`, { method: 'DELETE' });
              console.log(`deleted ${record.type} ${record.name} -> ${record.content}`);
            }

            const created = await cf(`${api}/zones/${zone.id}/dns_records`, {
              method: 'POST',
              body: JSON.stringify({
                type: 'CNAME',
                name: domain,
                content: target,
                ttl: 1,
                proxied: true,
              }),
            });
            console.log(`created ${created.result?.type || 'CNAME'} ${domain} -> ${target}`);
          }
          NODE

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name mojoaistudio-com --branch main

      - name: Purge Cloudflare cache
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          node - <<'NODE'
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const zoneName = 'mojoaistudio.com';
          const api = 'https://api.cloudflare.com/client/v4';
          const headers = {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json',
          };

          async function cf(url, init = {}) {
            const response = await fetch(url, { ...init, headers });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok || payload.success === false) {
              const errors = JSON.stringify(payload.errors || payload, null, 2);
              throw new Error(`Cloudflare cache request failed (${response.status}): ${errors}`);
            }
            return payload;
          }

          const zones = await cf(`${api}/zones?name=${encodeURIComponent(zoneName)}&per_page=1`);
          const zone = zones.result?.[0];
          if (!zone?.id) {
            throw new Error(`Cloudflare zone not found for ${zoneName}`);
          }

          await cf(`${api}/zones/${zone.id}/purge_cache`, {
            method: 'POST',
            body: JSON.stringify({ purge_everything: true }),
          });
          console.log(`Purged Cloudflare cache for ${zoneName}`);
          NODE
