name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-pages-mojo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static deploy folder
        env:
          POLAR_ORG:        ${{ vars.POLAR_ORG }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          mkdir -p _site
          rsync -av ./ _site/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.htaccess' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'AGENTS.md' \
            --exclude 'CLAUDE.md' \
            --exclude 'README.md' \
            --exclude 'SELLER_PAYOUT_SYSTEM.md' \
            --exclude 'api/' \
            --exclude 'cloudflare/' \
            --exclude 'docs/' \
            --exclude 'functions/' \
            --exclude 'node_modules/' \
            --exclude 'oauth/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'firebase.json' \
            --exclude 'firestore.rules' \
            --exclude 'firestore.indexes.json' \
            --exclude 'scripts/*.php' \
            --exclude 'scripts/*.mjs' \
            --exclude '_site/'
          cp _redirects _site/_redirects
          cp _headers _site/_headers
          BUST="${GITHUB_SHA:0:7}"
          ORG="${POLAR_ORG:-}"
          find _site -name "*.html" -exec sed -i "s/__CACHE_BUST__/$BUST/g" {} +
          find _site -name "*.js"   -exec sed -i "s/__CACHE_BUST__/$BUST/g" {} +
          if [ -n "$ORG" ]; then
            find _site -name "*.html" -exec sed -i "s|__POLAR_ORG__|$ORG|g" {} +
          fi
          if [ -n "$FIREBASE_API_KEY" ]; then
            find _site -name "*.js" -exec sed -i "s|__FIREBASE_API_KEY__|$FIREBASE_API_KEY|g" {} +
          fi
          cp cloudflare/pages-worker.js _site/_worker.js

      - name: Provision SMS reminder storage
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler kv namespace list > kv-namespaces.json
          KV_ID="$(node - <<'NODE'
          const fs = require('fs');
          const namespaces = JSON.parse(fs.readFileSync('kv-namespaces.json', 'utf8'));
          const found = namespaces.find((namespace) => namespace.title === 'mojo-sms-reminders');
          process.stdout.write(found ? found.id : '');
          NODE
          )"
          if [ -z "$KV_ID" ]; then
            npx wrangler kv namespace create mojo-sms-reminders > kv-create.txt
            KV_ID="$(node - <<'NODE'
            const fs = require('fs');
            const output = fs.readFileSync('kv-create.txt', 'utf8');
            const match = output.match(/id\\s*=\\s*"([^"]+)"/) || output.match(/"id"\\s*:\\s*"([^"]+)"/);
            if (!match) throw new Error('Unable to find KV namespace id in wrangler output.');
            process.stdout.write(match[1]);
            NODE
            )"
          fi
          node - <<NODE
          const fs = require('fs');
          fs.writeFileSync('wrangler.jsonc', JSON.stringify({
            name: 'mojoaistudio-com',
            pages_build_output_dir: './_site',
            compatibility_date: '2026-06-14',
            kv_namespaces: [{ binding: 'SMS_REMINDERS', id: '$KV_ID' }],
          }, null, 2));
          NODE
          cat wrangler.jsonc

      - name: Sync Pages runtime secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MEETUP_ADMIN_KEY:      ${{ secrets.MEETUP_ADMIN_KEY }}
          TWILIO_ACCOUNT_SID:    ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:     ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER:    ${{ secrets.TWILIO_FROM_NUMBER }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const required = [
            'MEETUP_ADMIN_KEY',
            'TWILIO_ACCOUNT_SID',
            'TWILIO_AUTH_TOKEN',
            'TWILIO_FROM_NUMBER',
          ];
          const secrets = {};
          for (const name of required) {
            const value = process.env[name] || '';
            if (!value) throw new Error(`Missing required secret: ${name}`);
            secrets[name] = value;
          }
          fs.writeFileSync('pages-secrets.json', JSON.stringify(secrets));
          NODE
          npx wrangler pages secret bulk pages-secrets.json --project-name mojoaistudio-com
          rm -f pages-secrets.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name mojoaistudio-com --branch main
